<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>芋作業管理</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="芋管理">
<meta name="theme-color" content="#2d6a4f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<style>
:root{
  --green:#2d6a4f;--gl:#40916c;--gp:#d8f3dc;
  --amber:#e76f00;--ap:#fff3e0;
  --red:#c1121f;--rp:#ffe5e5;
  --blue:#1565c0;--bp:#e3f2fd;
  --purple:#6a1b9a;--pp:#f3e5f5;
  --bg:#f7f5f0;--card:#fff;--text:#1a1a1a;--sub:#666;--bdr:#e0dbd0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
.hdr{background:var(--green);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.hdr h1{font-size:1.05rem;font-weight:700;}
.hdr .dt{font-size:.75rem;opacity:.85;}
nav{display:flex;background:#fff;border-bottom:2px solid var(--bdr);overflow-x:auto;}
nav button{flex:1;min-width:58px;padding:10px 3px;border:none;background:none;font-size:.7rem;color:var(--sub);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;}
nav button.on{color:var(--green);border-bottom-color:var(--green);font-weight:700;}
.wrap{padding:12px;max-width:900px;margin:0 auto;}
.tab{display:none;}.tab.on{display:block;}
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--bdr);}
.ctitle{font-size:.7rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.sg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
@media(min-width:560px){.sg{grid-template-columns:repeat(4,1fr);}}
.si{background:var(--card);border-radius:10px;padding:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid var(--bdr);text-align:center;}
.si .n{font-size:1.6rem;font-weight:700;line-height:1;}.si .l{font-size:.68rem;color:var(--sub);margin-top:3px;}
.si.g .n{color:var(--green);}.si.a .n{color:var(--amber);}.si.r .n{color:var(--red);}.si.b .n{color:var(--blue);}

/* タスクカード（今日タブ） */
.tcard{background:var(--card);border-radius:10px;padding:12px;margin-bottom:8px;box-shadow:0 1px 6px rgba(0,0,0,.06);border:1px solid var(--bdr);border-left:4px solid #ccc;}
.tcard.over{border-left-color:var(--red);}
.tcard.today-task{border-left-color:var(--amber);}
.tcard.week-task{border-left-color:var(--blue);}
.tcard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.tcard-name{font-size:.9rem;font-weight:700;flex:1;}
.tcard-meta{font-size:.7rem;color:var(--sub);}
.tcard-btns{display:flex;gap:6px;flex-wrap:wrap;}
.tc-comp{padding:6px 14px;border-radius:16px;border:none;background:var(--green);color:#fff;font-size:.75rem;font-weight:700;cursor:pointer;}
.tc-detail{padding:6px 12px;border-radius:16px;border:1px solid var(--bdr);background:#fff;color:var(--sub);font-size:.75rem;cursor:pointer;}
.tc-skip{padding:6px 12px;border-radius:16px;border:1px solid var(--bdr);background:#fff;color:var(--sub);font-size:.75rem;cursor:pointer;}

.badge{padding:2px 7px;border-radius:20px;font-size:.63rem;font-weight:700;white-space:nowrap;}
.bm{background:var(--bp);color:var(--blue);}
.bp2{background:var(--gp);color:var(--green);}
.bw{background:var(--ap);color:var(--amber);}
.bs{background:var(--pp);color:var(--purple);}
.bh{background:#fce4ec;color:#880e4f;}
.bw2{background:#e8f5e9;color:#2e7d32;}

.stabs{display:flex;gap:5px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;}
.stab{padding:6px 11px;border-radius:20px;border:1px solid var(--bdr);background:#fff;font-size:.72rem;cursor:pointer;white-space:nowrap;color:var(--sub);}
.stab.on{background:var(--green);color:#fff;border-color:var(--green);font-weight:700;}
.frow{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.fbtn{padding:4px 11px;border-radius:16px;border:1px solid var(--bdr);background:#fff;font-size:.7rem;cursor:pointer;color:var(--sub);}
.fbtn.on{background:var(--amber);color:#fff;border-color:var(--amber);font-weight:700;}

/* 圃場アイテム */
.fitem{padding:11px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.fitem:last-child{border-bottom:none;}
.fitem:active{background:#f9f9f7;}
.fh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.fname{font-size:.9rem;font-weight:700;}
.fvar{font-size:.65rem;padding:2px 7px;border-radius:10px;background:var(--gp);color:var(--green);font-weight:500;}
.pbar{height:5px;background:#eee;border-radius:3px;overflow:hidden;margin-bottom:5px;}
.pfill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gl),var(--green));}
.fsteps{display:flex;gap:4px;flex-wrap:wrap;}
.sdot{font-size:.63rem;padding:2px 7px;border-radius:10px;border:1px solid var(--bdr);}
.s-d{background:var(--gp);color:var(--green);border-color:var(--gp);}
.s-n{background:var(--ap);color:var(--amber);border-color:var(--ap);font-weight:700;}
.s-w{background:#f5f5f5;color:#999;}

/* 作業別行 */
.trow{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid var(--bdr);cursor:pointer;}
.trow:last-child{border-bottom:none;}
.trow:active{background:#f9f9f7;}

/* カレンダー */
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.chdr{text-align:center;font-size:.65rem;font-weight:700;color:var(--sub);padding:3px 0;}
.ccell{min-height:52px;background:#f9f9f7;border-radius:5px;padding:3px;border:1px solid transparent;}
.ccell.today{border-color:var(--green);background:var(--gp);}
.ccell.htask{background:#fff;border-color:var(--bdr);}
.cday{font-weight:700;font-size:.68rem;margin-bottom:2px;color:var(--sub);}
.cev{display:block;padding:1px 3px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.54rem;font-weight:500;}
.em{background:var(--bp);color:var(--blue);}
.ep{background:var(--gp);color:var(--green);}
.ew{background:var(--ap);color:var(--amber);}
.es{background:var(--pp);color:var(--purple);}

/* オーバーレイ・モーダル */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:18px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:1rem;font-weight:700;}
.close-btn{border:none;background:#eee;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;}

/* タイムライン */
.tlitem{display:flex;gap:10px;padding:8px 0;position:relative;}
.tlitem:not(:last-child)::after{content:'';position:absolute;left:9px;top:26px;bottom:-8px;width:2px;background:var(--bdr);}
.tldot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;color:#fff;margin-top:1px;}
.td-d{background:var(--green);}.td-n{background:var(--amber);}.td-w{background:#ccc;}
.tl-body{flex:1;}
.tl-lbl{font-size:.84rem;font-weight:600;}
.tl-date{font-size:.7rem;color:var(--sub);margin-bottom:4px;}
.tl-btns{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px;}
.comp-btn{padding:5px 12px;border-radius:14px;border:none;background:var(--green);color:#fff;font-size:.72rem;font-weight:700;cursor:pointer;}
.undo-btn{padding:4px 9px;border-radius:14px;border:1px solid var(--bdr);background:#fff;font-size:.68rem;color:var(--sub);cursor:pointer;}
.edit-date-btn{padding:4px 9px;border-radius:14px;border:1px solid var(--blue);background:var(--bp);font-size:.68rem;color:var(--blue);cursor:pointer;}

/* 次回予定バッジ */
.next-badge{display:inline-block;background:var(--ap);color:var(--amber);border-radius:10px;padding:2px 8px;font-size:.66rem;font-weight:700;margin-top:4px;}

/* フォーム */
.form-group{margin-bottom:12px;}
.form-label{font-size:.75rem;font-weight:700;color:var(--sub);margin-bottom:4px;display:block;}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:.88rem;outline:none;font-family:inherit;}
.form-input:focus{border-color:var(--green);}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--bdr);border-radius:8px;font-size:.88rem;outline:none;background:#fff;font-family:inherit;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn-primary{flex:1;padding:10px;border:none;background:var(--green);color:#fff;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;}
.btn-danger{padding:10px 14px;border:none;background:var(--red);color:#fff;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;}
.btn-secondary{flex:1;padding:10px;border:1px solid var(--bdr);background:#fff;color:var(--text);border-radius:10px;font-size:.85rem;cursor:pointer;}
.form-actions{display:flex;gap:8px;margin-top:14px;}

/* 設定 */
.set-title{font-size:.8rem;font-weight:700;color:var(--green);margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--gp);}
.set-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--bdr);}
.set-item:last-child{border-bottom:none;}
.set-lbl{font-size:.85rem;font-weight:600;}
.set-sub{font-size:.7rem;color:var(--sub);}
.edit-btn{padding:4px 10px;border-radius:14px;border:1px solid var(--bdr);background:#fff;font-size:.7rem;color:var(--blue);cursor:pointer;}
.del-btn{padding:4px 10px;border-radius:14px;border:none;background:var(--rp);color:var(--red);font-size:.7rem;cursor:pointer;margin-left:4px;}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;border:2px dashed var(--bdr);background:transparent;border-radius:10px;color:var(--sub);font-size:.8rem;cursor:pointer;width:100%;margin-top:8px;}
.add-btn:hover{border-color:var(--green);color:var(--green);}

/* 売上 */
.srow{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bdr);}
.srow:last-child{border-bottom:none;}
.sv{font-size:.95rem;font-weight:700;}
.sv.big{font-size:1.35rem;color:var(--green);}
.vrow{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.vn{font-size:.75rem;width:90px;}
.vt{flex:1;height:7px;background:#eee;border-radius:4px;overflow:hidden;}
.vf{height:100%;border-radius:4px;}
.c1{background:#f9a825;}.c2{background:#ef5350;}.c3{background:#ec407a;}.c4{background:#42a5f5;}.c5{background:#66bb6a;}
.vp{font-size:.68rem;color:var(--sub);}

/* brief */
.brief{background:linear-gradient(135deg,var(--green),var(--gl));color:#fff;border-radius:12px;padding:14px;margin-bottom:12px;}
.btitle{font-size:.7rem;font-weight:700;opacity:.8;letter-spacing:.08em;margin-bottom:5px;}
.bmsg{font-size:.95rem;font-weight:700;line-height:1.5;}
.bsub{font-size:.75rem;opacity:.85;margin-top:4px;}

/* 検索 */
.search-box{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;margin-bottom:10px;}
.search-box input{border:none;outline:none;flex:1;font-size:.85rem;font-family:inherit;}

.empty{text-align:center;color:var(--sub);padding:24px 0;font-size:.85rem;}
.eicon{font-size:2rem;margin-bottom:6px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:.82rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

/* 作業設定 */
.task-def-item{border:1px solid var(--bdr);border-radius:10px;padding:12px;margin-bottom:8px;background:#fafafa;}
.task-def-title{font-size:.82rem;font-weight:700;margin-bottom:4px;}
.task-def-sub{font-size:.7rem;color:var(--sub);}
</style>
</head>
<body>

<div class="hdr">
  <h1>🌿 芋作業管理</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="dt" id="todayLbl"></div>
    <div id="syncBadge" style="display:none;font-size:.65rem;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,.2);color:#fff;"></div>
  </div>
</div>

<nav id="mainNav">
  <button class="on" data-tab="today">今日</button>
  <button data-tab="calendar">カレンダー</button>
  <button data-tab="fields">圃場一覧</button>
  <button data-tab="tasks">作業別</button>
  <button data-tab="sales">収量・売上</button>
  <button data-tab="settings">⚙設定</button>
</nav>

<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#2d6a4f;color:#fff;padding:12px 16px;z-index:300;align-items:center;gap:10px;box-shadow:0 -2px 12px rgba(0,0,0,.2);">
  <span style="flex:1;font-size:.85rem;font-weight:700;">📱 ホーム画面に追加してアプリとして使えます</span>
  <button onclick="installApp()" style="background:#fff;color:#2d6a4f;border:none;padding:7px 14px;border-radius:16px;font-size:.8rem;font-weight:700;cursor:pointer;">追加</button>
  <button onclick="hideInstallBanner()" style="background:transparent;border:none;color:#fff;font-size:1.2rem;cursor:pointer;padding:0 4px;">×</button>
</div>
<div class="wrap">

  <!-- 今日 -->
  <div class="tab on" id="tab-today">
    <div class="brief">
      <div class="btitle">📋 本日のブリーフィング</div>
      <div class="bmsg" id="bmsg"></div>
      <div class="bsub" id="bsub"></div>
    </div>
    <div class="sg">
      <div class="si r" style="cursor:pointer;" onclick="scrollToSection('cardOver')"><div class="n" id="cntOver">0</div><div class="l">遅延作業 ↓</div></div>
      <div class="si a" style="cursor:pointer;" onclick="scrollToSection('cardToday')"><div class="n" id="cntToday">0</div><div class="l">今日の予定 ↓</div></div>
      <div class="si b" style="cursor:pointer;" onclick="scrollToSection('cardWeek')"><div class="n" id="cntWeek">0</div><div class="l">今週の予定 ↓</div></div>
      <div class="si g"><div class="n" id="cntDone">0</div><div class="l">植付完了</div></div>
    </div>
    <div class="card" id="cardOver"><div class="ctitle">⚠️ 遅延・緊急</div><div id="listOver"></div></div>
    <div class="card" id="cardToday"><div class="ctitle">📅 今日の作業</div><div id="listToday"></div></div>
    <div class="card" id="cardWeek"><div class="ctitle">📆 今週（7日以内）</div><div id="listWeek"></div></div>
  </div>

  <!-- カレンダー -->
  <div class="tab" id="tab-calendar">
    <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;">
      <button class="stab on" onclick="calMove(-1)">◀</button>
      <div class="stab on" id="calLabel" style="flex:1;text-align:center;background:var(--green);color:#fff;border-color:var(--green);pointer-events:none;"></div>
      <button class="stab on" onclick="calMove(1)">▶</button>
    </div>
    <div class="card">
      <div class="cgrid" id="calHdr"></div>
      <div class="cgrid" id="calBody"></div>
    </div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <span class="cev em" style="padding:3px 9px;border-radius:6px;">畝立</span>
      <span class="cev ep" style="padding:3px 9px;border-radius:6px;">植付</span>
      <span class="cev ew" style="padding:3px 9px;border-radius:6px;">除草</span>
      <span class="cev es" style="padding:3px 9px;border-radius:6px;">防除</span>
    </div>
  </div>

  <!-- 圃場一覧 -->
  <div class="tab" id="tab-fields">
    <div class="search-box"><span>🔍</span><input type="text" id="fieldSearch" placeholder="圃場名・品種で検索" oninput="renderFields()"></div>
    <div class="stabs" id="fieldVarTabs"></div>
    <div class="frow">
      <button class="fbtn on" data-fsort="next">次作業順</button>
      <button class="fbtn" data-fsort="progress">進捗順</button>
      <button class="fbtn" data-fsort="name">名前順</button>
    </div>
    <div style="margin-bottom:10px;"><button class="add-btn" onclick="openAddField()">＋ 圃場を追加</button></div>
    <div class="card"><div class="ctitle" id="fieldCount"></div><div id="fieldList"></div></div>
  </div>

  <!-- 作業別 -->
  <div class="tab" id="tab-tasks">
    <div class="stabs" id="taskTypeTabs"></div>
    <div class="frow" id="filterBtns">
      <button class="fbtn on" data-f="pending">未実施</button>
      <button class="fbtn" data-f="done">完了済み</button>
      <button class="fbtn" data-f="all">すべて</button>
    </div>
    <div class="card"><div class="ctitle" id="taskTitle"></div><div id="taskList"></div></div>
  </div>

  <!-- 売上 -->
  <div class="tab" id="tab-sales">
    <div class="sg">
      <div class="si g"><div class="n" id="sArea">0</div><div class="l">総面積(a)</div></div>
      <div class="si b"><div class="n" id="sFields">0</div><div class="l">圃場数</div></div>
      <div class="si a"><div class="n" id="sYield">0</div><div class="l">予想収量(t)</div></div>
      <div class="si r"><div class="n" id="sSales">0</div><div class="l">予想売上(万)</div></div>
    </div>
    <div class="card"><div class="ctitle">単価設定（円/kg）</div><div id="unitPriceForm"></div></div>
    <div class="card"><div class="ctitle">品種別面積</div><div id="varBar"></div></div>
    <div class="card"><div class="ctitle">品種別収量・売上</div><div id="salesDetail"></div></div>
  </div>

  <!-- 設定 -->
  <div class="tab" id="tab-settings">
    <div class="card" id="githubSettingCard">
      <div class="set-title">☁️ GitHubデータ同期</div>
      <div id="githubStatus" style="margin-bottom:10px;"></div>
      <div class="form-group">
        <label class="form-label">Personal Access Token</label>
        <input class="form-input" type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-primary" id="ghSaveTokenBtn">トークンを保存</button>
        <button class="btn-secondary" id="ghSyncNowBtn">今すぐ同期</button>
      </div>
      <div style="font-size:.7rem;color:var(--sub);margin-top:8px;">※ トークンはこの端末のみに保存されます。GitHubには送信しません。</div>
    </div>
    <div class="card">
      <div class="set-title">作業ステップ設定（除草剤・防除）</div>
      <div id="taskDefList"></div>
      <button class="add-btn" onclick="openAddTaskDef()">＋ 作業ステップを追加</button>
    </div>
    <div class="card">
      <div class="set-title">品種管理</div>
      <div id="varietyList"></div>
      <button class="add-btn" onclick="openAddVariety()">＋ 品種を追加</button>
    </div>
    <div class="card">
      <div class="set-title">反収設定（kg/10a）</div>
      <div id="yieldSettings"></div>
    </div>
    <div class="card">
      <div class="set-title">全圃場管理</div>
      <div id="fieldSettings"></div>
      <button class="add-btn" onclick="openAddField()">＋ 圃場を追加</button>
    </div>
  </div>
</div>

<!-- 圃場詳細 -->
<div class="overlay" id="detailOv">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="detailTitle"></div>
      <button class="close-btn" data-close="detailOv">×</button>
    </div>
    <div id="detailBody"></div>
  </div>
</div>

<!-- 汎用編集フォーム -->
<div class="overlay" id="editOv">
  <div class="modal">
    <div class="modal-hdr">
      <div class="modal-title" id="editTitle"></div>
      <button class="close-btn" data-close="editOv">×</button>
    </div>
    <div id="editBody"></div>
  </div>
</div>

<!-- 日付編集 -->
<div class="overlay" id="dateOv">
  <div class="modal" style="border-radius:12px;padding:20px;">
    <div class="modal-hdr"><div class="modal-title" id="dateOvTitle"></div><button class="close-btn" data-close="dateOv">×</button></div>
    <div id="dateOvBody"></div>

var comps = {};

var GH_OWNER = 'italfarm92-eng';
var GH_REPO  = 'imo-app';
var GH_FILE  = 'data.json';
var GH_API   = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' + GH_FILE;
var _ghToken = '';
var _ghSha   = '';       // GitHubファイルのSHA（更新時に必要）
var _syncTimer = null;   // 保存デバウンス用

// トークン読み込み
(function(){
  try { _ghToken = localStorage.getItem('imoApp_ghToken') || ''; } catch(e){}

// ============================================================
// localStorageへの即時保存（バックアップ）
// ============================================================
function saveLocal() {
  try {
    var data = buildDataObj();
    localStorage.setItem('imoApp_data', JSON.stringify(data));
  } catch(e) { console.warn('local保存エラー:', e); }
}

function loadLocal() {
  try {
    var s = localStorage.getItem('imoApp_data');
    if (s) { applyDataObj(JSON.parse(s)); return true; }
    // 旧形式マイグレーション
    var c = localStorage.getItem('imoApp_comps');
    if (c) comps = JSON.parse(c);
    var fd = localStorage.getItem('imoApp_fields');
    if (fd) fieldsData = JSON.parse(fd);
    var vr = localStorage.getItem('imoApp_varieties');
    if (vr) varieties = JSON.parse(vr);
    var yr = localStorage.getItem('imoApp_yieldRate');
    if (yr) yieldRate = JSON.parse(yr);
    var up = localStorage.getItem('imoApp_unitPrice');
    if (up) unitPrice = JSON.parse(up);
    var td = localStorage.getItem('imoApp_taskDefs');
    if (td) taskDefs = JSON.parse(td);
    return false;
  } catch(e) { console.warn('local読込エラー:', e); return false; }
}

// ============================================================
// データオブジェクト変換
// ============================================================
function buildDataObj() {
  return {
    version: 1,
    updatedAt: new Date().toISOString(),
    comps: comps,
    fieldsData: fieldsData,
    varieties: varieties,
    yieldRate: yieldRate,
    unitPrice: unitPrice,
    taskDefs: taskDefs
  };
}

function applyDataObj(obj) {
  if (!obj) return;
  if (obj.comps)      comps      = obj.comps;
  if (obj.fieldsData) fieldsData = obj.fieldsData;
  if (obj.varieties)  varieties  = obj.varieties;
  if (obj.yieldRate)  yieldRate  = obj.yieldRate;
  if (obj.unitPrice)  unitPrice  = obj.unitPrice;
  if (obj.taskDefs)   taskDefs   = obj.taskDefs;
}

// ============================================================
// GitHubへの保存
// ============================================================
function saveToGitHub(cb) {
  if (!_ghToken) { if (cb) cb(false, 'トークン未設定'); return; }
  setSyncBadge('saving');
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(buildDataObj(), null, 2))));
  var body = { message: 'データ更新 ' + new Date().toLocaleString('ja'), content: content };
  if (_ghSha) body.sha = _ghSha;
  fetch(GH_API, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + _ghToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.content && data.content.sha) {
      _ghSha = data.content.sha;
      setSyncBadge('ok');
      if (cb) cb(true);
    } else {
      setSyncBadge('error');
      console.warn('GitHub保存エラー:', data);
      if (cb) cb(false, JSON.stringify(data.message||data));
    }
  })
  .catch(function(e) {
    setSyncBadge('error');
    if (cb) cb(false, e.toString());
  });
}

// ============================================================
// GitHubからの読み込み
// ============================================================
function loadFromGitHub(cb) {
  if (!_ghToken) { if (cb) cb(false); return; }
  setSyncBadge('loading');
  fetch(GH_API + '?t=' + Date.now(), {
    headers: { 'Authorization': 'token ' + _ghToken }
  })
  .then(function(r) {
    if (r.status === 404) { setSyncBadge('ok'); if (cb) cb(false, '404'); return null; }
    return r.json();
  })
  .then(function(data) {
    if (!data) return;
    if (data.content && data.sha) {
      _ghSha = data.sha;
      var json = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
      var obj = JSON.parse(json);
      applyDataObj(obj);
      saveLocal();
      setSyncBadge('ok');
      if (cb) cb(true);
    } else {
      setSyncBadge('error');
      if (cb) cb(false, JSON.stringify(data.message||data));
    }
  })
  .catch(function(e) {
    setSyncBadge('error');
    if (cb) cb(false, e.toString());
  });
}

// ============================================================
// 同期バッジ表示
// ============================================================
function setSyncBadge(state) {
  var b = document.getElementById('syncBadge');
  if (!b) return;
  var map = { ok:'☁️ 同期済', saving:'⬆️ 保存中...', loading:'⬇️ 読込中...', error:'⚠️ 同期エラー', notoken:'─' };
  b.textContent = map[state] || state;
  b.style.display = state === 'notoken' ? 'none' : 'flex';
  b.style.background = state==='error' ? 'rgba(193,18,31,.5)' : 'rgba(255,255,255,.2)';
}

// ============================================================
// 統合保存（local即時 + GitHub遅延）
// ============================================================
function saveAll() {
  saveLocal();
  if (!_ghToken) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(function() {
    saveToGitHub(function(ok, err) {
      if (!ok) { showToast('⚠️ GitHub同期エラー: ' + (err||'不明')); }
    });
  }, 1500); // 1.5秒後にGitHubへ保存（連続入力対策）
}

// ============================================================
// 起動時ロード（GitHub優先・失敗時はlocal）
// ============================================================
function loadAll() {
  loadLocal(); // まずlocalを即時反映
  if (_ghToken) {
    loadFromGitHub(function(ok, err) {
      if (ok) {
        refreshAll();
        updateGitHubStatusUI();
      } else if (err !== '404') {
        showToast('⚠️ GitHub読込失敗。ローカルデータを使用します。');
        updateGitHubStatusUI();
      }
    });
  }
  updateGitHubStatusUI();
}

// ============================================================
// 設定UI更新
// ============================================================
function updateGitHubStatusUI() {
  var statusEl = document.getElementById('githubStatus');
  var tokenEl  = document.getElementById('ghToken');
  if (!statusEl) return;
  if (_ghToken) {
    statusEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--gp);border-radius:8px;">'
      + '<span style="font-size:1rem;">✅</span>'
      + '<div><div style="font-size:.82rem;font-weight:700;color:var(--green);">GitHub同期が有効です</div>'
      + '<div style="font-size:.7rem;color:var(--sub);">'+GH_OWNER+'/'+GH_REPO+'/'+GH_FILE+'</div></div>'
      + '<button class="del-btn" id="ghClearTokenBtn" style="margin-left:auto;">解除</button>'
      + '</div>';
    if (tokenEl) { tokenEl.value = ''; tokenEl.placeholder = '設定済み（変更する場合のみ入力）'; }
    document.getElementById('ghClearTokenBtn').addEventListener('click', function(){
      confirm2('GitHub同期を解除しますか？', function(){
        _ghToken = ''; _ghSha = '';
        try { localStorage.removeItem('imoApp_ghToken'); } catch(e){}
        setSyncBadge('notoken');
        updateGitHubStatusUI();
        showToast('GitHub同期を解除しました');
      });
    });
  } else {
    statusEl.innerHTML = '<div style="padding:8px;background:#fff3e0;border-radius:8px;font-size:.78rem;color:var(--amber);">'
      + '⚠️ トークンを設定するとGitHubにデータが自動保存されます</div>';
    setSyncBadge('notoken');
  }
}

function saveComps() { saveAll(); }
function isDone(fid,key) { return !!(comps[fid]&&comps[fid][key]); }
function getCompDate(fid,key) { return (comps[fid]&&comps[fid][key])||null; }
function markDone(fid,key,dateStr) { if(!comps[fid]) comps[fid]={}; comps[fid][key]=dateStr; saveAll(); }
function markUndone(fid,key) { if(comps[fid]) { delete comps[fid][key]; } saveAll(); }

// ============================================================
// 動的ステップ計算
// 基本4ステップ＋taskDefsの除草・防除多段
// ============================================================
function getSteps(raw) {
  // 基本ステップ
  var mulchDate  = pd(raw.md);
  var plantDate  = raw.pr ? pd(raw.pr) : (mulchDate ? addD(mulchDate,7) : null);
  var harvDate   = raw.hv ? pd(raw.hv) : null;

  var steps = [];

  // 畝立
  steps.push({
    key:'mulch', label:'畝立・マルチ',
    schDate: mulchDate,
    done: isDone(raw.id,'mulch') || !!raw.md,
    compDate: getCompDate(raw.id,'mulch') || (raw.md||null),
    origDone: !!raw.md,
    sub: raw.h ? '肥料：'+raw.h : '',
    badgeCls:'bm', evCls:'em'
  });

  // 植付
  steps.push({
    key:'plant', label:'植付',
    schDate: plantDate,
    done: isDone(raw.id,'plant') || !!raw.pr,
    compDate: getCompDate(raw.id,'plant') || (raw.pr||null),
    origDone: !!raw.pr,
    sub: raw.s ? '消毒：'+raw.s : '',
    badgeCls:'bp2', evCls:'ep'
  });

  // 除草剤ステップ（taskDefsから動的生成）
  var weedDefs = taskDefs.filter(function(d){ return d.type==='weed'; })
    .sort(function(a,b){ return a.order-b.order; });

  var prevWeedCompDate = null;
  for (var wi=0; wi<weedDefs.length; wi++) {
    var def = weedDefs[wi];
    var schDate = null;
    if (wi===0) {
      // 1回目：Excelのw1または植付+14日
      schDate = raw.w1 ? pd(raw.w1) : (plantDate ? addD(plantDate,14) : null);
    } else {
      // 2回目以降：前回完了日 or 予定日 + interval
      var prevKey = weedDefs[wi-1].id;
      var prevComp = getCompDate(raw.id, prevKey);
      var prevSch = steps[steps.length-1] ? steps[steps.length-1].schDate : null;
      var base = prevComp ? pd(prevComp) : prevSch;
      schDate = base ? addD(base, def.intervalDays) : null;
    }
    var done = isDone(raw.id, def.id);
    var compDate = getCompDate(raw.id, def.id);
    steps.push({
      key: def.id, label: def.label,
      schDate: schDate, done: done,
      compDate: compDate, origDone: false,
      sub:'', badgeCls:'bw', evCls:'ew',
      defType:'weed', defOrder:def.order, intervalDays:def.intervalDays
    });
    if (done) prevWeedCompDate = compDate;
  }

  // 防除ステップ
  var sprayDefs = taskDefs.filter(function(d){ return d.type==='spray'; })
    .sort(function(a,b){ return a.order-b.order; });

  for (var si=0; si<sprayDefs.length; si++) {
    var def = sprayDefs[si];
    var schDate = null;
    if (si===0) {
      schDate = raw.sp ? pd(raw.sp) : (plantDate ? addD(plantDate,21) : null);
    } else {
      var prevKey = sprayDefs[si-1].id;
      var prevComp = getCompDate(raw.id, prevKey);
      var prevStep = steps[steps.length-1];
      var base = prevComp ? pd(prevComp) : (prevStep ? prevStep.schDate : null);
      schDate = base ? addD(base, def.intervalDays) : null;
    }
    var done = isDone(raw.id, def.id);
    steps.push({
      key: def.id, label: def.label,
      schDate: schDate, done: done,
      compDate: getCompDate(raw.id, def.id), origDone: false,
      sub:'', badgeCls:'bs', evCls:'es',
      defType:'spray', defOrder:def.order, intervalDays:def.intervalDays
    });
  }

  // 収穫
  steps.push({
    key:'harvest', label:'収穫',
    schDate: harvDate,
    done: isDone(raw.id,'harvest'),
    compDate: getCompDate(raw.id,'harvest'),
    origDone: false,
    sub:'', badgeCls:'bh', evCls:'ep'
  });

  return steps;
}

function buildField(raw) {
  var steps = getSteps(raw);
  // 進捗：基本4ステップ（畝立・植付・除草1・防除1）
  var baseKeys = ['mulch','plant','weed1','spray1'];
  var doneCnt = baseKeys.filter(function(k){
    var s = steps.find(function(x){ return x.key===k; });
    return s && s.done;
  }).length;
  var progress = doneCnt/4*100;

  // 次タスク
  var nextStep = null;
  for (var i=0; i<steps.length; i++) {
    if (!steps[i].done) { nextStep = steps[i]; break; }
  }

  return {
    id:raw.id, g:raw.g, n:raw.n, nm:raw.nm, a:raw.a, v:raw.v, h:raw.h, s:raw.s,
    steps:steps, progress:progress, nextStep:nextStep
  };
}

function getFields() { return fieldsData.map(buildField); }

// タスク収集（今日・カレンダー用）
// ============================================================
function collectTasks() {
  var result = [];
  getFields().forEach(function(f) {
    f.steps.forEach(function(s) {
      if (!s.done && s.schDate) {
        result.push({field:f, step:s, date:s.schDate});
      }
    });
  });
  return result.sort(function(a,b){ return a.date-b.date; });
}

    + '<div class="tcard-top">'

    + '</div>'

    + '<div class="tcard-btns">'
    + '<button class="tc-comp" data-comp="'+esc(t.field.id)+'" data-key="'+esc(t.step.key)+'">✓ 完了</button>'
    + '<button class="tc-detail" data-id="'+esc(t.field.id)+'">詳細</button>'

function renderToday() {
  var tasks = collectTasks();
  var over  = tasks.filter(function(t){ return dif(t.date,TODAY)<0; });
  var tod   = tasks.filter(function(t){ return dif(t.date,TODAY)===0; });
  var week  = tasks.filter(function(t){ var d=dif(t.date,TODAY); return d>0&&d<=7; });
  var done  = getFields().filter(function(f){ return f.steps.find(function(s){return s.key==='plant'&&s.done;}); }).length;

  document.getElementById('cntOver').textContent  = over.length;
  document.getElementById('cntToday').textContent = tod.length;
  document.getElementById('cntWeek').textContent  = week.length;
  document.getElementById('cntDone').textContent  = done;

  var msg='',sub='';
  if (over.length>0) {
    msg='⚠️ '+over.length+'件の遅延作業があります';
    sub=over.slice(0,3).map(function(t){return t.field.nm+'（'+t.step.label+'）';}).join('、')+(over.length>3?'など':'');
  } else if (tod.length>0) {
    msg='本日の作業は'+tod.length+'件です';
    sub=tod.slice(0,3).map(function(t){return t.field.nm+'：'+t.step.label;}).join('　');
  } else if (week.length>0) {
    msg='今日の作業はありません。今週中に'+week.length+'件の予定';
    sub='次：'+fmt(week[0].date)+'　'+week[0].field.nm+'（'+week[0].step.label+'）';
  } else {
    msg='直近の緊急作業はありません';sub='ゆっくり確認しましょう';
  }
  document.getElementById('bmsg').textContent=msg;
  document.getElementById('bsub').textContent=sub;

  function renderList(arr, cls, emptyIcon) {
    if (!arr.length) return '<div class="empty"><div class="eicon">'+emptyIcon+'</div></div>';
    return arr.map(function(t){ return todayCardHTML(t, cls); }).join('');
  }
  document.getElementById('listOver').innerHTML   = renderList(over,  'over',       '✅ 遅延作業はありません');
  document.getElementById('listToday').innerHTML  = renderList(tod,   'today-task', '🌤️ 今日の予定はありません');
  document.getElementById('listWeek').innerHTML   = renderList(week,  'week-task',  '今週の予定はありません');
}

var calYear=2026, calMonth=4;
function calMove(d) {
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  else if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar() {
  document.getElementById('calLabel').textContent=calYear+'年'+(calMonth+1)+'月';
  document.getElementById('calHdr').innerHTML=['日','月','火','水','木','金','土'].map(function(h){
    return '<div class="chdr">'+h+'</div>';
  }).join('');
  var tasks=collectTasks(), map={};
  tasks.forEach(function(t){
    var k=t.date.getFullYear()+'-'+t.date.getMonth()+'-'+t.date.getDate();
    if(!map[k])map[k]=[];
    map[k].push(t);
  });
  var fd=new Date(calYear,calMonth,1).getDay();
  var ld=new Date(calYear,calMonth+1,0).getDate();
  var html='';
  for(var i=0;i<fd;i++) html+='<div class="ccell"></div>';
  for(var day=1;day<=ld;day++){
    var isToday=day===TODAY.getDate()&&calMonth===TODAY.getMonth()&&calYear===TODAY.getFullYear();
    var k=calYear+'-'+calMonth+'-'+day;
    var dt=map[k]||[];
    var cls='ccell'+(isToday?' today':dt.length?' htask':'');
    var evs=dt.slice(0,3).map(function(t){
      return '<span class="cev '+(t.step.evCls||'ep')+'" data-id="'+esc(t.field.id)+'" style="cursor:pointer;">'+esc(t.field.nm)+'</span>';
    }).join('');
    if(dt.length>3) evs+='<span style="font-size:.5rem;color:var(--sub);">+'+(dt.length-3)+'</span>';
    html+='<div class="'+cls+'"><div class="cday">'+day+'</div>'+evs+'</div>';
  }
  document.getElementById('calBody').innerHTML=html;
}

      +'<span class="fvar">'+esc(f.v)+'</span></div>'

      +'<div class="fsteps">'+sd('mulch','畝立')+sd('plant','植付')+sd('weed1','除草1')+sd('spray1','防除1')+nextInfo+'</div>'

var curType='plant', curFilter='pending';
function buildTaskTypeTabs() {
  var types = [{key:'mulch',lbl:'畝立'},{key:'plant',lbl:'植付'}];
  var weedDefs=taskDefs.filter(function(d){return d.type==='weed';}).sort(function(a,b){return a.order-b.order;});
  var sprayDefs=taskDefs.filter(function(d){return d.type==='spray';}).sort(function(a,b){return a.order-b.order;});
  weedDefs.forEach(function(d){ types.push({key:d.id,lbl:d.label}); });
  sprayDefs.forEach(function(d){ types.push({key:d.id,lbl:d.label}); });
  types.push({key:'harvest',lbl:'収穫'});
  document.getElementById('taskTypeTabs').innerHTML=types.map(function(t){
    return '<button class="stab'+(t.key===curType?' on':'')+'" data-type="'+esc(t.key)+'">'+esc(t.lbl)+'</button>';
  }).join('');
}
function renderTaskTab() {
  var fields=getFields();
  var list=[];
  fields.forEach(function(f){
    var s=f.steps.find(function(x){return x.key===curType;});
    if(!s)return;
    if(curFilter==='pending'&&s.done)return;
    if(curFilter==='done'&&!s.done)return;
    list.push({f:f,s:s});
  });
  list.sort(function(a,b){
    var da=a.s.schDate, db=b.s.schDate;
    if(!da&&!db)return 0; if(!da)return 1; if(!db)return -1; return da-db;
  });
  var typeLbl=(function(){
    var d=taskDefs.find(function(x){return x.id===curType;});
    if(d)return d.label;
    return {mulch:'畝立・マルチ',plant:'植付',harvest:'収穫'}[curType]||curType;
  })();
  var fl=curFilter==='pending'?'未実施':curFilter==='done'?'完了済み':'すべて';
  document.getElementById('taskTitle').textContent=typeLbl+'　'+fl+'（'+list.length+'件）';
  if(!list.length){document.getElementById('taskList').innerHTML='<div class="empty"><div class="eicon">✅</div>該当なし</div>';return;}
  document.getElementById('taskList').innerHTML=list.map(function(item){
    var f=item.f, s=item.s;
    var done=s.done, date=s.schDate;
    var d=date?dif(date,TODAY):null;
    var ds=date?fmt(date):'日程未定', clr='color:var(--sub)';
    if(done){ds='完了 '+ds;clr='color:var(--green);font-weight:700';}
    else if(d!==null&&d<0){ds+='（'+Math.abs(d)+'日遅延）';clr='color:var(--red);font-weight:700';}
    else if(d!==null&&d<=3){ds+='（'+d+'日後）';clr='color:var(--amber);font-weight:700';}
    var dot=done?'var(--green)':d!==null&&d<0?'var(--red)':d!==null&&d<=3?'var(--amber)':'#ccc';
    return '<div class="trow" data-id="'+esc(f.id)+'">'
      +'<div style="width:10px;height:10px;border-radius:50%;background:'+dot+';flex-shrink:0;"></div>'
      +'<div style="flex:1"><div style="font-size:.86rem;font-weight:600;">'+esc(f.nm)+'</div>'
      +'<div style="font-size:.7rem;color:var(--sub);">'+esc(f.v)+'・'+f.a+'a</div></div>'
      +'<div style="font-size:.72rem;'+clr+'">'+ds+'</div>'
      +'<div style="color:#bbb;">›</div></div>';
  }).join('');
}

function openDetail(id) {
  var raw=fieldsData.find(function(r){return r.id===id;});
  if(!raw)return;
  var f=buildField(raw);
  document.getElementById('detailTitle').textContent=f.nm+'　'+f.v+'・'+f.a+'a';

  var prog='<div style="margin-bottom:14px;">'
    +'<div class="pbar" style="height:7px;margin-bottom:4px;"><div class="pfill" style="width:'+f.progress+'%"></div></div>'
    +'<div style="font-size:.7rem;color:var(--sub);display:flex;justify-content:space-between;">'
    +'<span>G:'+f.g+'　No.'+f.n+'</span><span>進捗 '+Math.round(f.progress)+'%</span></div></div>';

  var tl=f.steps.map(function(s,i){
    var prevDone=f.steps.slice(0,i).every(function(p){return p.done;});
    var isNext=!s.done&&prevDone;
    var dc=s.done?'td-d':isNext?'td-n':'td-w';
    var icon=s.done?'✓':isNext?'→':'○';
    var d=s.schDate?dif(s.schDate,TODAY):null;
    var ds=s.schDate?fmt(s.schDate):'—';
    var diffH='';
    if(!s.done&&d!==null){
      if(d<0) diffH='<span style="color:var(--red);font-weight:700;"> '+Math.abs(d)+'日遅延</span>';
      else if(d===0) diffH='<span style="color:var(--amber);font-weight:700;"> 今日</span>';
      else diffH='<span style="color:var(--sub);"> '+d+'日後</span>';
    }
    // 次回予定バッジ（完了したweed/sprayで次ステップがある場合）
    var nextBadge='';
    if(s.done&&(s.defType==='weed'||s.defType==='spray')){
      var nextDef=taskDefs.find(function(d){return d.type===s.defType&&d.order===s.defOrder+1;});
      if(nextDef){
        var base=s.compDate?pd(s.compDate):s.schDate;
        var nextDate=base?addD(base,nextDef.intervalDays):null;
        if(nextDate) nextBadge='<div class="next-badge">→ '+esc(nextDef.label)+'：'+fmt(nextDate)+'予定</div>';
      }
    }
    // ボタン群
    var btns='';
    if(s.done){
      var dstr=s.compDate||'';
      btns='<span style="font-size:.68rem;color:var(--green);font-weight:700;">✓ 完了'+(dstr?' ('+dstr+')':'')+'</span>'
        +'<button class="edit-date-btn" data-editdate="'+esc(id)+'" data-key="'+esc(s.key)+'" data-curdate="'+esc(dstr)+'">日付編集</button>'
        +(!s.origDone?'<button class="undo-btn" data-undo="'+esc(id)+'" data-key="'+esc(s.key)+'">取消</button>':'');
    } else {
      btns='<button class="comp-btn" data-comp="'+esc(id)+'" data-key="'+esc(s.key)+'">✓ 完了にする</button>';
    }
    return '<div class="tlitem">'
      +'<div class="tldot '+dc+'">'+icon+'</div>'
      +'<div class="tl-body">'
      +'<div class="tl-lbl" style="color:'+(s.done?'var(--green)':isNext?'var(--amber)':'#999')+'">'+esc(s.label)+'</div>'
      +'<div class="tl-date">'+ds+diffH+'</div>'
      +(s.sub?'<div style="font-size:.68rem;color:var(--sub);">'+esc(s.sub)+'</div>':'')
      +nextBadge
      +'<div class="tl-btns">'+btns+'</div>'
      +'</div></div>';
  }).join('');

  var editArea='<div style="margin-top:14px;display:flex;gap:8px;">'
    +'<button class="btn-secondary" style="flex:1" data-editfield="'+esc(id)+'">✏️ 圃場編集</button>'
    +'<button class="btn-danger" data-delfield="'+esc(id)+'">削除</button>'
    +'</div>';

  document.getElementById('detailBody').innerHTML=prog+tl+editArea;
  openOv('detailOv');
}

function saveField(){
  var nm=document.getElementById('ef-nm').value.trim();
  var a=parseFloat(document.getElementById('ef-a').value);
  if(!nm){showToast('圃場名を入力してください');return;}
  if(!a||a<=0){showToast('面積を正しく入力してください');return;}
  var g=document.getElementById('ef-g').value;
  var n=document.getElementById('ef-n').value.trim();
  var rec={id:editingId||(g+'-'+n+'-'+Date.now()),g:g,n:n,nm:nm,a:a,
    v:document.getElementById('ef-v').value,
    h:document.getElementById('ef-h').value.trim(),
    s:document.getElementById('ef-s').value.trim(),
    md:document.getElementById('ef-md').value.trim()||null,
    pr:document.getElementById('ef-pr').value.trim()||null,
    w1:document.getElementById('ef-w1').value.trim()||null,
    sp:document.getElementById('ef-sp').value.trim()||null,
    hv:document.getElementById('ef-hv').value.trim()||null};
  if(editingId){
    var idx=fieldsData.findIndex(function(x){return x.id===editingId;});
    if(idx>=0)fieldsData[idx]=rec;
    showToast(nm+'を更新しました');
  } else {
    fieldsData.push(rec);showToast(nm+'を追加しました');
  }
  closeOv('editOv');saveAll();refreshAll();
}
function deleteField(id){
  var raw=fieldsData.find(function(x){return x.id===id;});
  confirm2((raw?raw.nm:'圃場')+'を削除しますか？',function(){
    fieldsData=fieldsData.filter(function(x){return x.id!==id;});
    closeOv('detailOv');showToast('削除しました');saveAll();refreshAll();
  });
}

// 売上集計
// ============================================================
function renderSales(){
  var fields=getFields();
  var totalArea=fields.reduce(function(s,f){return s+f.a;},0);
  var byV={};
  fields.forEach(function(f){byV[f.v]=(byV[f.v]||0)+f.a;});
  var totalKg=0,estTotal=0;
  fields.forEach(function(f){var kg=f.a*(yieldRate[f.v]||250);totalKg+=kg;estTotal+=kg*(unitPrice[f.v]||18);});
  document.getElementById('sArea').textContent=Math.round(totalArea*10)/10;
  document.getElementById('sFields').textContent=fields.length;
  document.getElementById('sYield').textContent=Math.round(totalKg/100)/10;
  document.getElementById('sSales').textContent=Math.round(estTotal/10000);
  document.getElementById('unitPriceForm').innerHTML=varieties.map(function(v){
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr);">'
      +'<span style="flex:1;font-size:.8rem;">'+esc(v)+'</span>'
      +'<input type="number" class="form-input" style="width:80px;padding:5px 8px;" value="'+(unitPrice[v]||18)+'" data-pricevar="'+esc(v)+'">'
      +'<span style="font-size:.72rem;color:var(--sub);">円/kg</span></div>';
  }).join('');
  var cols=['c1','c2','c3','c4','c5'];
  document.getElementById('varBar').innerHTML=Object.keys(byV).sort(function(a,b){return byV[b]-byV[a];}).map(function(v,i){
    var ar=byV[v],pct=Math.round(ar/totalArea*100);
    return '<div class="vrow"><div class="vn">'+esc(v)+'</div>'
      +'<div class="vt"><div class="vf '+cols[i%cols.length]+'" style="width:'+pct+'%"></div></div>'
      +'<div class="vp">'+Math.round(ar*10)/10+'a ('+pct+'%)</div></div>';
  }).join('');
  var rows=varieties.map(function(v){
    var ar=byV[v]||0,kg=ar*(yieldRate[v]||250),sale=kg*(unitPrice[v]||18);
    return '<div class="srow"><span>'+esc(v)+'</span>'
      +'<span style="font-size:.78rem;color:var(--sub);">'+Math.round(ar*10)/10+'a　'+Math.round(kg/100)/10+'t　'
      +'<span style="color:var(--green);font-weight:700;">'+Math.round(sale/10000)+'万円</span></span></div>';
  }).join('');
  document.getElementById('salesDetail').innerHTML=rows
    +'<div class="srow"><span style="font-weight:700;">合計</span><span class="sv big">'+Math.round(estTotal/10000).toLocaleString()+' 万円</span></div>'
    +'<div style="font-size:.7rem;color:var(--sub);margin-top:6px;">※ Excel記載売上：15,830,180円</div>';
}

// ============================================================
// イベント委任（一元管理）
// ============================================================
document.body.addEventListener('click',function(e){
  var el=e.target;

  // 閉じるボタン
  var closeEl=el.closest('[data-close]');
  if(closeEl){closeOv(closeEl.getAttribute('data-close'));return;}

  // メインタブ
  var navBtn=el.closest('#mainNav button[data-tab]');
  if(navBtn){
    var tab=navBtn.getAttribute('data-tab');
    document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
    document.querySelectorAll('#mainNav button').forEach(function(b){b.classList.remove('on');});
    document.getElementById('tab-'+tab).classList.add('on');
    navBtn.classList.add('on');
    if(tab==='settings')renderSettings();
    return;
  }

  // 品種フィルタータブ
  var varTab=el.closest('#fieldVarTabs [data-var]');
  if(varTab){
    fieldVarFilter=varTab.getAttribute('data-var');
    document.querySelectorAll('#fieldVarTabs .stab').forEach(function(b){b.classList.remove('on');});
    varTab.classList.add('on');renderFields();return;
  }

  // 圃場ソート
  var sortBtn=el.closest('[data-fsort]');
  if(sortBtn){
    fieldSort=sortBtn.getAttribute('data-fsort');
    document.querySelectorAll('[data-fsort]').forEach(function(b){b.classList.remove('on');});
    sortBtn.classList.add('on');renderFields();return;
  }

  // 作業種別タブ
  var typeTab=el.closest('#taskTypeTabs [data-type]');
  if(typeTab){
    curType=typeTab.getAttribute('data-type');
    document.querySelectorAll('#taskTypeTabs .stab').forEach(function(b){b.classList.remove('on');});
    typeTab.classList.add('on');renderTaskTab();return;
  }

  // フィルター
  var filterBtn=el.closest('#filterBtns [data-f]');
  if(filterBtn){
    curFilter=filterBtn.getAttribute('data-f');
    document.querySelectorAll('#filterBtns .fbtn').forEach(function(b){b.classList.remove('on');});
    filterBtn.classList.add('on');renderTaskTab();return;
  }

  // カレンダー圃場名クリック
  var calEv=el.closest('.cev[data-id]');
  if(calEv){openDetail(calEv.getAttribute('data-id'));return;}

  // 圃場行クリック
  var fitem=el.closest('.fitem[data-id]');
  if(fitem&&!el.closest('button')){openDetail(fitem.getAttribute('data-id'));return;}

  // 作業行クリック
  var trow=el.closest('.trow[data-id]');
  if(trow&&!el.closest('button')){openDetail(trow.getAttribute('data-id'));return;}

  // 今日タブの詳細ボタン
  var detailBtn=el.closest('[data-id].tc-detail');
  if(detailBtn){openDetail(detailBtn.getAttribute('data-id'));return;}
  if(el.classList.contains('tc-detail')&&el.hasAttribute('data-id')){openDetail(el.getAttribute('data-id'));return;}

  // 完了ボタン
  var compEl=el.closest('[data-comp]');
  if(compEl){
    var fid=compEl.getAttribute('data-comp'),key=compEl.getAttribute('data-key');
    markDone(fid,key,fmt(TODAY));
    showToast('完了しました（'+fmt(TODAY)+'）');
    if(document.getElementById('detailOv').classList.contains('on'))openDetail(fid);
    refreshAll();return;
  }

  // 取消ボタン
  var undoEl=el.closest('[data-undo]');
  if(undoEl){
    var fid=undoEl.getAttribute('data-undo'),key=undoEl.getAttribute('data-key');
    markUndone(fid,key);
    showToast('完了を取り消しました');
    if(document.getElementById('detailOv').classList.contains('on'))openDetail(fid);
    refreshAll();return;
  }

  // 日付編集ボタン
  var editDateEl=el.closest('[data-editdate]');
  if(editDateEl){
    openDateEdit(editDateEl.getAttribute('data-editdate'),editDateEl.getAttribute('data-key'),editDateEl.getAttribute('data-curdate'));return;
  }

  // 圃場編集・削除
  var editFieldEl=el.closest('[data-editfield]');
  if(editFieldEl){openEditField(editFieldEl.getAttribute('data-editfield'));return;}
  var delFieldEl=el.closest('[data-delfield]');
  if(delFieldEl){deleteField(delFieldEl.getAttribute('data-delfield'));return;}

  // 品種編集・削除
  var editVarEl=el.closest('[data-editvar]');
  if(editVarEl){openEditVariety(editVarEl.getAttribute('data-editvar'));return;}
  var delVarEl=el.closest('[data-delvar]');
  if(delVarEl){deleteVariety(delVarEl.getAttribute('data-delvar'));return;}

  // 作業定義編集・削除
  var editTdEl=el.closest('[data-edittaskdef]');
  if(editTdEl){openEditTaskDef(editTdEl.getAttribute('data-edittaskdef'));return;}
  var delTdEl=el.closest('[data-deltaskdef]');
  if(delTdEl){deleteTaskDef(delTdEl.getAttribute('data-deltaskdef'));return;}

  // オーバーレイ背景クリック
  ['detailOv','editOv','dateOv','confirmOv'].forEach(function(id){
    if(el.id===id)closeOv(id);
  });
});

// 売上数値だけ更新（inputを再生成しない）
function updateSalesNumbers(){
  var fields=getFields();
  var totalArea=fields.reduce(function(s,f){return s+f.a;},0);
  var totalKg=0,estTotal=0;
  fields.forEach(function(f){var kg=f.a*(yieldRate[f.v]||250);totalKg+=kg;estTotal+=kg*(unitPrice[f.v]||18);});
  var sYield=document.getElementById('sYield');
  var sSales=document.getElementById('sSales');
  if(sYield)sYield.textContent=Math.round(totalKg/100)/10;
  if(sSales)sSales.textContent=Math.round(estTotal/10000);
  // salesDetailのみ再描画（inputは含まない）
  var byV={};
  fields.forEach(function(f){byV[f.v]=(byV[f.v]||0)+f.a;});
  var rows=varieties.map(function(v){
    var ar=byV[v]||0,kg=ar*(yieldRate[v]||250),sale=kg*(unitPrice[v]||18);
    return '<div class="srow"><span>'+esc(v)+'</span>'
      +'<span style="font-size:.78rem;color:var(--sub);">'+Math.round(ar*10)/10+'a　'+Math.round(kg/100)/10+'t　'
      +'<span style="color:var(--green);font-weight:700;">'+Math.round(sale/10000)+'万円</span></span></div>';
  }).join('');
  var det=document.getElementById('salesDetail');
  if(det)det.innerHTML=rows
    +'<div class="srow"><span style="font-weight:700;">合計</span><span class="sv big">'+Math.round(estTotal/10000).toLocaleString()+' 万円</span></div>'
    +'<div style="font-size:.7rem;color:var(--sub);margin-top:6px;">※ Excel記載売上：15,830,180円</div>';
}

// ============================================================
// 初期化
// ============================================================
// 保存データ復元（GitHub優先・失敗時はlocal）
loadAll();

document.getElementById('todayLbl').textContent=(TODAY.getMonth()+1)+'/'+TODAY.getDate()+'('+DN[TODAY.getDay()]+')';
buildVarTabs();
buildTaskTypeTabs();
refreshAll();

// iOS Safari向け：ページ離脱前に保存
window.addEventListener('pagehide', saveAll);
window.addEventListener('visibilitychange', function(){ if(document.visibilityState==='hidden') saveAll(); });

// GitHub設定ボタン
document.addEventListener('click', function(e){
  if (e.target.id === 'ghSaveTokenBtn') {
    var t = document.getElementById('ghToken').value.trim();
    if (!t) { showToast('トークンを入力してください'); return; }
    _ghToken = t;
    try { localStorage.setItem('imoApp_ghToken', t); } catch(ex){}
    showToast('トークンを保存しました。GitHubと同期します...');
    updateGitHubStatusUI();
    loadFromGitHub(function(ok){
      if (ok) { refreshAll(); showToast('✅ GitHubからデータを読み込みました'); }
      else { saveToGitHub(function(ok2){ if(ok2) showToast('✅ GitHubにデータを保存しました'); }); }
    });
  }
  if (e.target.id === 'ghSyncNowBtn') {
    if (!_ghToken) { showToast('先にトークンを設定してください'); return; }
    showToast('GitHubと同期中...');
    loadFromGitHub(function(ok){
      if (ok) { refreshAll(); showToast('✅ 同期完了'); }
      else { saveToGitHub(function(ok2){ showToast(ok2 ? '✅ 同期完了' : '⚠️ 同期失敗'); }); }
    });
  }
});
</script>
<script>
// ============================================================
// PWA: Service Worker登録
// ============================================================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg) { console.log('SW登録完了:', reg.scope); })
      .catch(function(err) { console.log('SW登録失敗:', err); });
  });
}

// ============================================================
// インストールバナー（ホーム画面追加）
// ============================================================
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  var banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'flex';
});
window.addEventListener('appinstalled', function() {
  var banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
  deferredPrompt = null;
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
}
function hideInstallBanner() {
  var banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
}
</script>
